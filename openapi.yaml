openapi: 3.0.3
info:
    title: MechHub Miniback API
    version: 1.0.0
    description: Standalone backend for MechHub. Authentication is session-based and uses the `mechhub.sid` cookie.

servers:
    - url: http://localhost:3001
      description: Local development server

tags:
    - name: Health
      description: Service health endpoints
    - name: Auth
      description: Authentication and current-user endpoints
    - name: Users
      description: Current-user profile endpoints
    - name: Classes
      description: Class creation, membership, and role management endpoints
    - name: Assignments
      description: Assignment publishing, submission, and review endpoints
    - name: Dashboards
      description: Aggregated teacher, class, and student dashboard endpoints
    - name: Uploads
      description: Shared file upload endpoints for assignments and submissions
    - name: SoloChat
      description: SoloChat conversation, message history, and streaming AI reply endpoints

components:
    securitySchemes:
        cookieAuth:
            type: apiKey
            in: cookie
            name: mechhub.sid

    schemas:
        User:
            type: object
            required:
                - id
                - email
                - displayName
                - avatarUrl
                - bio
                - defaultRole
                - createdAt
            properties:
                id:
                    type: integer
                    example: 1
                email:
                    type: string
                    format: email
                    example: test@example.com
                displayName:
                    type: string
                    example: MechFox4821
                avatarUrl:
                    type: string
                    example: https://api.dicebear.com/9.x/pixel-art/svg?seed=MechFox4821
                bio:
                    type: string
                    example: Building the next mechanics education workflow.
                defaultRole:
                    type: string
                    enum: [teacher, student]
                    example: student
                createdAt:
                    type: string
                    format: date-time
                    example: 2026-03-23T09:00:00.100Z

        UpdateMeRequest:
            type: object
            properties:
                displayName:
                    type: string
                    maxLength: 100
                    example: StaticNova3141
                avatarUrl:
                    type: string
                    maxLength: 2048
                    example: https://api.dicebear.com/9.x/pixel-art/svg?seed=StaticNova3141
                bio:
                    type: string
                    maxLength: 500
                    example: Studying statics and mechanics every day.

        RegisterRequest:
            type: object
            required:
                - email
                - password
                - defaultRole
            properties:
                email:
                    type: string
                    format: email
                    example: test@example.com
                password:
                    type: string
                    minLength: 8
                    example: password123
                defaultRole:
                    type: string
                    enum: [teacher, student]
                    example: student

        LoginRequest:
            type: object
            required:
                - email
                - password
            properties:
                email:
                    type: string
                    format: email
                    example: test@example.com
                password:
                    type: string
                    example: password123

        LogoutResponse:
            type: object
            required:
                - message
            properties:
                message:
                    type: string
                    example: Logged out

        HealthResponse:
            type: object
            required:
                - status
            properties:
                status:
                    type: string
                    example: ok

        ErrorResponse:
            type: object
            required:
                - message
            properties:
                message:
                    type: string
                    example: Not authenticated

        Class:
            type: object
            required:
                - id
                - name
                - description
                - ownerUserId
                - inviteCode
                - status
                - createdAt
                - membershipRole
                - isOwner
            properties:
                id:
                    type: integer
                    example: 1
                name:
                    type: string
                    example: Statics 101
                description:
                    type: string
                    example: Introductory statics class for spring term.
                ownerUserId:
                    type: integer
                    example: 1
                inviteCode:
                    type: string
                    example: 8F1A2C4D
                status:
                    type: string
                    enum: [active, archived]
                    example: active
                createdAt:
                    type: string
                    format: date-time
                    example: 2026-03-23T09:10:00.200Z
                membershipRole:
                    type: string
                    enum: [teacher, student]
                    nullable: true
                    example: teacher
                isOwner:
                    type: boolean
                    example: true

        CreateClassRequest:
            type: object
            required:
                - name
            properties:
                name:
                    type: string
                    maxLength: 120
                    example: Statics 101
                description:
                    type: string
                    maxLength: 1000
                    example: Introductory statics class for spring term.

        JoinClassRequest:
            type: object
            required:
                - inviteCode
            properties:
                inviteCode:
                    type: string
                    example: 8F1A2C4D

        UpdateClassMemberRoleRequest:
            type: object
            required:
                - role
            properties:
                role:
                    type: string
                    enum: [teacher, student]
                    example: teacher

        ClassMember:
            type: object
            required:
                - id
                - classId
                - userId
                - role
                - joinedAt
                - isOwner
                - user
            properties:
                id:
                    type: integer
                    example: 1
                classId:
                    type: integer
                    example: 1
                userId:
                    type: integer
                    example: 1
                role:
                    type: string
                    enum: [teacher, student]
                    example: teacher
                joinedAt:
                    type: string
                    format: date-time
                    example: 2026-03-23T09:10:00.250Z
                isOwner:
                    type: boolean
                    example: true
                user:
                    $ref: "#/components/schemas/User"

        UpdateClassRequest:
            type: object
            properties:
                name:
                    type: string
                    maxLength: 120
                    example: Statics 101 - Section A
                description:
                    type: string
                    maxLength: 1000
                    example: Updated spring term statics section.
                status:
                    type: string
                    enum: [active, archived]
                    example: active

        FileAsset:
            type: object
            required:
                - id
                - fileName
                - url
                - mimeType
                - sizeBytes
                - purpose
                - createdAt
            properties:
                id:
                    type: integer
                    example: 21
                fileName:
                    type: string
                    example: assignment-week-3.pdf
                url:
                    type: string
                    example: /uploads/files/21
                mimeType:
                    type: string
                    example: application/pdf
                sizeBytes:
                    type: integer
                    example: 184291
                width:
                    type: integer
                    nullable: true
                    example: 1536
                height:
                    type: integer
                    nullable: true
                    example: 1024
                kind:
                    type: string
                    enum: [image, document, file]
                    example: image
                purpose:
                    type: string
                    enum:
                        [assignment_attachment, submission_attachment, solochat]
                    example: assignment_attachment
                createdAt:
                    type: string
                    format: date-time
                    example: 2026-03-25T09:31:00.456Z

        Assignment:
            type: object
            required:
                - id
                - classId
                - className
                - title
                - description
                - attachments
                - startAt
                - dueAt
                - allowLateSubmission
                - maxScore
                - status
                - createdByUserId
                - publishedAt
                - closedAt
                - createdAt
                - updatedAt
            properties:
                id:
                    type: integer
                    example: 9
                classId:
                    type: integer
                    example: 1
                className:
                    type: string
                    example: Statics 101
                title:
                    type: string
                    example: Week 3 Force Balance Homework
                description:
                    type: string
                    example: Solve problems 1-5 and explain your free-body diagrams.
                attachments:
                    type: array
                    items:
                        $ref: "#/components/schemas/FileAsset"
                startAt:
                    type: string
                    format: date-time
                    nullable: true
                    example: 2026-03-25T08:00:00.000Z
                dueAt:
                    type: string
                    format: date-time
                    nullable: true
                    example: 2026-03-30T15:59:59.000Z
                allowLateSubmission:
                    type: boolean
                    example: false
                maxScore:
                    type: number
                    format: float
                    example: 100
                status:
                    type: string
                    enum: [draft, published, closed, archived]
                    example: published
                createdByUserId:
                    type: integer
                    example: 1
                publishedAt:
                    type: string
                    format: date-time
                    nullable: true
                    example: 2026-03-25T08:10:00.000Z
                closedAt:
                    type: string
                    format: date-time
                    nullable: true
                    example: null
                createdAt:
                    type: string
                    format: date-time
                    example: 2026-03-25T08:00:00.000Z
                updatedAt:
                    type: string
                    format: date-time
                    example: 2026-03-25T08:10:00.000Z

        CreateAssignmentRequest:
            type: object
            required:
                - title
                - description
            properties:
                title:
                    type: string
                    maxLength: 200
                    example: Week 3 Force Balance Homework
                description:
                    type: string
                    maxLength: 10000
                    example: Solve problems 1-5 and explain your free-body diagrams.
                attachmentIds:
                    type: array
                    items:
                        type: integer
                    example: [21, 22]
                startAt:
                    type: string
                    format: date-time
                    nullable: true
                    example: 2026-03-25T08:00:00.000Z
                dueAt:
                    type: string
                    format: date-time
                    nullable: true
                    example: 2026-03-30T15:59:59.000Z
                allowLateSubmission:
                    type: boolean
                    example: false
                maxScore:
                    type: number
                    format: float
                    example: 100
                status:
                    type: string
                    enum: [draft, published]
                    example: published

        UpdateAssignmentRequest:
            type: object
            properties:
                title:
                    type: string
                    maxLength: 200
                    example: Week 3 Force Balance Homework - Revised
                description:
                    type: string
                    maxLength: 10000
                    example: Solve problems 1-6 and explain your free-body diagrams clearly.
                attachmentIds:
                    type: array
                    items:
                        type: integer
                    example: [21, 22, 25]
                startAt:
                    type: string
                    format: date-time
                    nullable: true
                    example: 2026-03-25T08:00:00.000Z
                dueAt:
                    type: string
                    format: date-time
                    nullable: true
                    example: 2026-04-01T15:59:59.000Z
                allowLateSubmission:
                    type: boolean
                    example: true
                maxScore:
                    type: number
                    format: float
                    example: 120

        AssignmentReview:
            type: object
            required:
                - score
                - comment
                - reviewedAt
                - reviewerUserId
                - reviewer
            properties:
                score:
                    type: number
                    format: float
                    example: 92
                comment:
                    type: string
                    example: Force decomposition is correct. Add more explanation for question 4.
                reviewedAt:
                    type: string
                    format: date-time
                    example: 2026-03-30T08:30:00.000Z
                reviewerUserId:
                    type: integer
                    example: 1
                reviewer:
                    $ref: "#/components/schemas/User"

        ReviewAssignmentSubmissionRequest:
            type: object
            required:
                - score
            properties:
                score:
                    type: number
                    format: float
                    example: 92
                comment:
                    type: string
                    example: Force decomposition is correct. Add more explanation for question 4.

        AssignmentSubmission:
            type: object
            required:
                - id
                - assignmentId
                - studentId
                - student
                - submissionStatus
                - textAnswer
                - attachments
                - submittedAt
                - updatedAt
                - isLate
                - review
            properties:
                id:
                    type: integer
                    nullable: true
                    example: 44
                assignmentId:
                    type: integer
                    example: 9
                studentId:
                    type: integer
                    example: 3
                student:
                    $ref: "#/components/schemas/User"
                submissionStatus:
                    type: string
                    enum:
                        [
                            not_started,
                            draft,
                            submitted,
                            late_submitted,
                            reviewed,
                        ]
                    example: submitted
                textAnswer:
                    type: string
                    example: I first drew the free-body diagram for each body and listed the equilibrium equations.
                attachments:
                    type: array
                    items:
                        $ref: "#/components/schemas/FileAsset"
                submittedAt:
                    type: string
                    format: date-time
                    nullable: true
                    example: 2026-03-29T14:00:00.000Z
                updatedAt:
                    type: string
                    format: date-time
                    nullable: true
                    example: 2026-03-29T14:00:00.000Z
                isLate:
                    type: boolean
                    example: false
                review:
                    allOf:
                        - $ref: "#/components/schemas/AssignmentReview"
                    nullable: true

        UpsertMyAssignmentSubmissionRequest:
            type: object
            required:
                - status
            properties:
                textAnswer:
                    type: string
                    example: My written solution is below.
                attachmentIds:
                    type: array
                    items:
                        type: integer
                    example: [31]
                status:
                    type: string
                    enum: [draft, submitted]
                    example: submitted

        TeacherClassDashboardItem:
            type: object
            required:
                - class
                - studentCount
                - assignmentCount
                - pendingReviewCount
                - upcomingDueCount
            properties:
                class:
                    $ref: "#/components/schemas/Class"
                studentCount:
                    type: integer
                    example: 32
                assignmentCount:
                    type: integer
                    example: 8
                pendingReviewCount:
                    type: integer
                    example: 14
                upcomingDueCount:
                    type: integer
                    example: 2

        TeacherClassesDashboard:
            type: object
            required:
                - summary
                - classes
            properties:
                summary:
                    type: object
                    required:
                        - classCount
                        - studentCount
                        - assignmentCount
                        - pendingReviewCount
                    properties:
                        classCount:
                            type: integer
                            example: 3
                        studentCount:
                            type: integer
                            example: 96
                        assignmentCount:
                            type: integer
                            example: 24
                        pendingReviewCount:
                            type: integer
                            example: 31
                classes:
                    type: array
                    items:
                        $ref: "#/components/schemas/TeacherClassDashboardItem"

        TeacherAssignmentDashboardItem:
            type: object
            required:
                - assignmentId
                - classId
                - className
                - title
                - status
                - dueAt
                - totalStudents
                - submittedCount
                - reviewedCount
                - pendingReviewCount
            properties:
                assignmentId:
                    type: integer
                    example: 9
                classId:
                    type: integer
                    example: 1
                className:
                    type: string
                    example: Statics 101
                title:
                    type: string
                    example: Week 3 Force Balance Homework
                status:
                    type: string
                    enum: [draft, published, closed, archived]
                    example: published
                dueAt:
                    type: string
                    format: date-time
                    nullable: true
                    example: 2026-03-30T15:59:59.000Z
                totalStudents:
                    type: integer
                    example: 32
                submittedCount:
                    type: integer
                    example: 28
                reviewedCount:
                    type: integer
                    example: 17
                pendingReviewCount:
                    type: integer
                    example: 11

        TeacherAssignmentsDashboard:
            type: object
            required:
                - summary
                - assignments
            properties:
                summary:
                    type: object
                    required:
                        - assignmentCount
                        - publishedCount
                        - pendingReviewCount
                        - overdueCount
                    properties:
                        assignmentCount:
                            type: integer
                            example: 24
                        publishedCount:
                            type: integer
                            example: 18
                        pendingReviewCount:
                            type: integer
                            example: 31
                        overdueCount:
                            type: integer
                            example: 4
                assignments:
                    type: array
                    items:
                        $ref: "#/components/schemas/TeacherAssignmentDashboardItem"

        ClassDashboard:
            type: object
            required:
                - class
                - summary
                - members
                - assignments
            properties:
                class:
                    $ref: "#/components/schemas/Class"
                summary:
                    type: object
                    required:
                        - studentCount
                        - assignmentCount
                        - pendingReviewCount
                    properties:
                        studentCount:
                            type: integer
                            example: 32
                        assignmentCount:
                            type: integer
                            example: 8
                        pendingReviewCount:
                            type: integer
                            example: 14
                members:
                    type: array
                    items:
                        $ref: "#/components/schemas/ClassMember"
                assignments:
                    type: array
                    items:
                        $ref: "#/components/schemas/TeacherAssignmentDashboardItem"

        AssignmentClassDashboard:
            type: object
            required:
                - assignment
                - summary
                - submissions
            properties:
                assignment:
                    $ref: "#/components/schemas/Assignment"
                summary:
                    type: object
                    required:
                        - studentCount
                        - submittedCount
                        - reviewedCount
                        - pendingReviewCount
                        - lateCount
                    properties:
                        studentCount:
                            type: integer
                            example: 32
                        submittedCount:
                            type: integer
                            example: 28
                        reviewedCount:
                            type: integer
                            example: 17
                        pendingReviewCount:
                            type: integer
                            example: 11
                        lateCount:
                            type: integer
                            example: 3
                submissions:
                    type: array
                    items:
                        $ref: "#/components/schemas/AssignmentSubmission"

        StudentAssignmentCard:
            type: object
            required:
                - assignmentId
                - classId
                - className
                - title
                - dueAt
                - assignmentStatus
                - submissionStatus
                - submittedAt
                - isLate
                - score
            properties:
                assignmentId:
                    type: integer
                    example: 9
                classId:
                    type: integer
                    example: 1
                className:
                    type: string
                    example: Statics 101
                title:
                    type: string
                    example: Week 3 Force Balance Homework
                dueAt:
                    type: string
                    format: date-time
                    nullable: true
                    example: 2026-03-30T15:59:59.000Z
                assignmentStatus:
                    type: string
                    enum: [draft, published, closed, archived]
                    example: published
                submissionStatus:
                    type: string
                    enum:
                        [
                            not_started,
                            draft,
                            submitted,
                            late_submitted,
                            reviewed,
                        ]
                    example: submitted
                submittedAt:
                    type: string
                    format: date-time
                    nullable: true
                    example: 2026-03-29T14:00:00.000Z
                isLate:
                    type: boolean
                    example: false
                score:
                    type: number
                    format: float
                    nullable: true
                    example: 92

        StudentAssignmentsDashboard:
            type: object
            required:
                - summary
                - assignments
            properties:
                summary:
                    type: object
                    required:
                        - pendingCount
                        - dueSoonCount
                        - submittedCount
                        - reviewedCount
                    properties:
                        pendingCount:
                            type: integer
                            example: 3
                        dueSoonCount:
                            type: integer
                            example: 1
                        submittedCount:
                            type: integer
                            example: 6
                        reviewedCount:
                            type: integer
                            example: 4
                assignments:
                    type: array
                    items:
                        $ref: "#/components/schemas/StudentAssignmentCard"

        SoloChatConversation:
            type: object
            required:
                - id
                - title
                - updatedAt
            properties:
                id:
                    type: integer
                    example: 1
                title:
                    type: string
                    example: Force Balance Basics
                updatedAt:
                    type: string
                    format: date-time
                    example: 2026-03-23T09:30:00.123Z

        RenameSoloChatConversationRequest:
            type: object
            required:
                - title
            properties:
                title:
                    type: string
                    maxLength: 120
                    example: Statics Week 3 Review

        SoloChatMessage:
            type: object
            required:
                - id
                - conversationId
                - role
                - content
                - status
                - attachments
                - createdAt
                - updatedAt
            properties:
                id:
                    type: integer
                    example: 12
                conversationId:
                    type: integer
                    example: 1
                role:
                    type: string
                    enum: [user, assistant]
                    example: assistant
                content:
                    type: string
                    example: Start by drawing the free-body diagram.
                status:
                    type: string
                    enum: [streaming, completed, failed]
                    example: completed
                attachments:
                    type: array
                    items:
                        $ref: "#/components/schemas/SoloChatImageAttachment"
                createdAt:
                    type: string
                    format: date-time
                    example: 2026-03-23T09:31:00.456Z
                updatedAt:
                    type: string
                    format: date-time
                    example: 2026-03-23T09:31:02.012Z

        CreateSoloChatMessageRequest:
            type: object
            description: Multipart request shape for sending a SoloChat message with inline attachments.
            properties:
                content:
                    type: string
                    example: Explain free-body diagrams.
                attachments:
                    type: array
                    items:
                        type: string
                        format: binary

        SoloChatImageAttachment:
            type: object
            required:
                - id
                - kind
                - purpose
                - fileName
                - url
                - mimeType
                - width
                - height
                - sizeBytes
                - createdAt
            properties:
                id:
                    type: integer
                    example: 7
                kind:
                    type: string
                    enum: [image, document]
                    example: image
                purpose:
                    type: string
                    enum: [solochat]
                    example: solochat
                fileName:
                    type: string
                    example: beam-notes.md
                url:
                    type: string
                    example: /uploads/files/7
                mimeType:
                    type: string
                    example: image/webp
                width:
                    type: integer
                    nullable: true
                    example: 1536
                height:
                    type: integer
                    nullable: true
                    example: 1024
                sizeBytes:
                    type: integer
                    example: 482913
                createdAt:
                    type: string
                    format: date-time
                    example: 2026-03-25T09:31:00.456Z

paths:
    /health:
        get:
            tags:
                - Health
            summary: Check service health
            operationId: getHealth
            responses:
                "200":
                    description: Service is running
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/HealthResponse"

    /auth/register:
        post:
            tags:
                - Auth
            summary: Register a new user
            operationId: registerUser
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            $ref: "#/components/schemas/RegisterRequest"
            responses:
                "201":
                    description: User created and logged in with a generated display name and avatar
                    headers:
                        Set-Cookie:
                            description: Session cookie for the authenticated user
                            schema:
                                type: string
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/User"
                "400":
                    description: Invalid email, password, or default role
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/ErrorResponse"
                "409":
                    description: Email already exists
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/ErrorResponse"

    /auth/login:
        post:
            tags:
                - Auth
            summary: Log in with email and password
            operationId: loginUser
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            $ref: "#/components/schemas/LoginRequest"
            responses:
                "200":
                    description: Login successful
                    headers:
                        Set-Cookie:
                            description: Session cookie for the authenticated user
                            schema:
                                type: string
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/User"
                "400":
                    description: Missing or invalid fields
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/ErrorResponse"
                "401":
                    description: Invalid email or password
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/ErrorResponse"

    /auth/me:
        get:
            tags:
                - Auth
            summary: Get the current authenticated user
            operationId: getCurrentUser
            security:
                - cookieAuth: []
            responses:
                "200":
                    description: Current user
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/User"
                "401":
                    description: Not authenticated
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/ErrorResponse"

    /auth/logout:
        post:
            tags:
                - Auth
            summary: Log out the current user
            operationId: logoutUser
            security:
                - cookieAuth: []
            responses:
                "200":
                    description: Logout successful
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/LogoutResponse"

    /users/me:
        get:
            tags:
                - Users
            summary: Get the current user's profile
            operationId: getMyProfile
            security:
                - cookieAuth: []
            responses:
                "200":
                    description: Current user profile
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/User"
                "401":
                    description: Not authenticated
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/ErrorResponse"

        patch:
            tags:
                - Users
            summary: Update the current user's editable profile fields
            operationId: updateMyProfile
            security:
                - cookieAuth: []
            requestBody:
                required: true
                content:
                    application/json:
